<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <!-- Für lokale Entwicklung "/". Der GitHub-Pages-Workflow ersetzt das beim
         Deploy auf den Unterordner der Seite (siehe deploy-pages.yml) — sonst
         würden alle Assets unter dem falschen Pfad gesucht. -->
    <base href="/LebensplanerAppPub/" />
    <!-- viewport-fit=cover: Ohne das ist env(safe-area-inset-bottom) immer 0, und
         die Navigation läge auf dem iPhone unter dem Home-Indikator. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lebensplaner</title>
    <link href="_framework/dotnet.4gabvxpuee.js" rel="preload" as="script" fetchpriority="high" crossorigin="anonymous" integrity="sha256-XEOk/5FRX9qMAk16cqjMNeFJvYYK4eRlIUWPGmvm3sA=" />
    <!-- Erst die Grundlage aus Core (Tokens, Basis), dann die Schale, dann der
         Rest der Vorlage: Später Geladenes darf Früheres überschreiben. -->
    <link rel="stylesheet" href="_content/Lebensplaner.Core/css/grundlage.css" />
    <link rel="stylesheet" href="css/schale.css" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="Lebensplaner.App.styles.css" rel="stylesheet" /> -->
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <!-- Ein fester Wert statt zweier Varianten: Das Theme ist seit dem
         Neon-Redesign nicht mehr an prefers-color-scheme gekoppelt (die
         helle Fassung entfällt), also gibt es auch nur noch eine Statusleisten-
         Farbe. -->
    <meta name="theme-color" content="#05070a" />
    <!-- Deprecated zugunsten von manifest.display, aber iOS liest das Manifest
         erst ab 16.4. Darunter startet die App ohne diese Zeile im Tab-Modus —
         und dann meldet navigator.standalone nie einen Homescreen-Start und
         US-19 (F-8) prüfte etwas anderes als gemeint. Welche iOS-Version das
         Testgerät hat, weiß hier niemand. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

<body>

            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
